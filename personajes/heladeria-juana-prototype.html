
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heladería de Juana - Prototipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Varela+Round&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: oklch(97% 0.018 70); /* Crema Vainilla */
      --surface: oklch(99% 0.008 70);
      --fg: oklch(25% 0.04 40); /* Chocolate Cálido */
      --accent: oklch(75% 0.15 20); /* Fresa Pastel */
      --mint: oklch(92% 0.08 160);
      --sky: oklch(90% 0.06 230);
      --border: oklch(90% 0.02 70);
      --font-display: 'Fredoka', sans-serif;
      --font-body: 'Varela Round', sans-serif;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0;
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--fg);
      height: 100%; overflow: hidden;
    }

    /* UI Kit: Bubbly & Squishy */
    .btn-bubbly {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 0 oklch(65% 0.15 20);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .btn-bubbly:hover { transform: translateY(-2px); box-shadow: 0 6px 0 oklch(65% 0.15 20); }
    .btn-bubbly:active { transform: translateY(2px); box-shadow: 0 0 0 oklch(65% 0.15 20); }

    .card {
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
    }

    /* Game Layout */
    .game-container {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      gap: 20px;
      background-image: radial-gradient(var(--border) 2px, transparent 2px);
      background-size: 40px 40px;
    }

    .hud-top {
      display: flex; justify-content: space-between; align-items: center;
    }

    .stats-pill {
      background: rgba(255,255,255,0.9);
      padding: 8px 16px;
      border-radius: 20px;
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-display);
      border: 2px solid var(--border);
      box-shadow: 0 4px 0 var(--border);
    }

    .happiness-bar-bg {
      width: 150px; height: 16px;
      background: #eee; border-radius: 10px; overflow: hidden;
      border: 2px solid var(--border);
    }
    .happiness-bar-fill {
      height: 100%; background: var(--accent);
      transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .main-view {
      display: grid; grid-template-columns: 1fr 400px; gap: 40px;
      align-items: end;
    }

    .counter-area {
      position: relative;
      background: oklch(94% 0.02 70);
      height: 400px;
      border-radius: 40px 40px 0 0;
      border: 4px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding-top: 60px;
    }

    .ingredients-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      padding: 20px;
      background: rgba(255,255,255,0.5);
      border-radius: 30px;
      margin: 10px;
    }

    .ingredient-slot {
      width: 70px; height: 70px;
      background: white; border-radius: 20px;
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 2rem;
    }
    .ingredient-slot:hover { 
      transform: scale(1.15) rotate(5deg); 
      border-color: var(--accent);
      background: var(--surface);
    }

    .customer-area {
      height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      position: relative;
    }

    .bubble-order {
      background: white; border-radius: 30px; padding: 20px 30px;
      position: absolute; top: 0; right: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 3px solid var(--sky);
      z-index: 10;
    }
    .bubble-order::after {
      content: ''; position: absolute; bottom: -20px; left: 40px;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 20px solid var(--sky);
    }

    .character-img {
      max-width: 110%; max-height: 500px;
      filter: drop-shadow(0 15px 15px rgba(0,0,0,0.1));
      pointer-events: none;
    }

    /* Animaciones Cozy */
    @keyframes slowFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }
    .floating { animation: slowFloat 4s ease-in-out infinite; }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    .icecream-display {
      font-size: 6rem;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .icecream-bump { transform: scale(1.3) rotate(10deg); }

    /* Responsive */
    @media (max-width: 900px) {
      .main-view { grid-template-columns: 1fr; }
      .customer-area { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ name, size = '1.2em' }) => {
      const icons = {
        star: '⭐',
        coin: '🪙',
        heart: '❤️',
        icecream: '🍦',
        strawberry: '🍓',
        chocolate: '🍫',
        mint: '🌿',
        cookie: '🍪',
        magic: '✨',
        apple: '🍎'
      };
      return <span style={{fontSize: size, display: 'inline-block'}}>{icons[name] || name}</span>;
    };

    const Game = () => {
      const [happiness, setHappiness] = useState(85);
      const [coins, setCoins] = useState(150);
      const [isBumping, setIsBumping] = useState(false);
      const [feedback, setFeedback] = useState(null);

      const ingredients = [
        { id: 'strawberry', icon: '🍓' },
        { id: 'chocolate', icon: '🍫' },
        { id: 'mint', icon: '🌿' },
        { id: 'icecream', icon: '🍦' },
        { id: 'magic', icon: '✨' },
        { id: 'cookie', icon: '🍪' },
        { id: 'apple', icon: '🍎' },
        { id: 'rainbow', icon: '🌈' }
      ];

      const handleAction = (type) => {
        setIsBumping(true);
        setTimeout(() => setIsBumping(false), 300);
        
        if (type === 'ingredient') {
          setHappiness(prev => Math.min(100, prev + 2));
          setFeedback('¡Yummy!');
          setTimeout(() => setFeedback(null), 1000);
        }
      };

      return (
        <div className="game-container">
          {/* HUD SUPERIOR */}
          <header className="hud-top pop-in">
            <div style={{display: 'flex', gap: 20}}>
              <div className="stats-pill">
                <Icon name="coin" /> <span>{coins}</span>
              </div>
              <div className="stats-pill">
                <Icon name="star" /> <span>Nivel 5</span>
              </div>
            </div>

            <div className="stats-pill">
              <Icon name="heart" />
              <div className="happiness-bar-bg">
                <div className="happiness-bar-fill" style={{width: `${happiness}%`}} />
              </div>
            </div>
          </header>

          {/* VISTA PRINCIPAL DEL MOSTRADOR */}
          <main className="main-view">
            <div className="counter-area card pop-in">
              <div className="bubble-order pop-in">
                <div style={{fontFamily: 'var(--font-display)', color: 'var(--accent)', fontSize: '1.1rem', marginBottom: 8}}>
                  Pedido de Papá:
                </div>
                <div style={{display: 'flex', gap: 10, fontSize: '1.4rem', alignItems: 'center'}}>
                  <Icon name="strawberry" /> <span style={{opacity: 0.5}}>+</span> <Icon name="icecream" />
                </div>
              </div>

              <div style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center'}}>
                {feedback && (
                  <div className="pop-in" style={{
                    position: 'absolute', top: 120, 
                    fontFamily: 'var(--font-display)', 
                    color: 'var(--accent)', fontSize: '2rem'
                  }}>
                    {feedback}
                  </div>
                )}
                <div className={`icecream-display ${isBumping ? 'icecream-bump' : ''}`}>
                  <Icon name="icecream" size="1em" />
                </div>
              </div>

              <div className="ingredients-grid">
                {ingredients.map((ing) => (
                  <div 
                    key={ing.id} 
                    className="ingredient-slot" 
                    onClick={() => handleAction('ingredient')}
                  >
                    {ing.icon}
                  </div>
                ))}
              </div>
              
              <button className="btn-bubbly" onClick={() => {
                setCoins(c => c + 50);
                setHappiness(100);
                setFeedback('¡Increíble! ✨');
              }}>
                ¡Entregar a Papá!
              </button>
            </div>

            {/* PERSONAJE: JUAN (PAPÁ) */}
            <div className="customer-area">
              <img 
                src="mpb58zhf-WhatsApp-Image-2026-05-16-at-12.51.20-PM.jpeg" 
                className="character-img floating" 
                alt="Juan el Papá"
              />
            </div>
          </main>

          {/* MENÚ INFERIOR */}
          <footer style={{display: 'flex', justifyContent: 'center', gap: 24, paddingBottom: 10}}>
            <button className="btn-bubbly" style={{background: 'var(--mint)', boxShadow: '0 4px 0 oklch(80% 0.1 160)'}}>
              📖 Recetario
            </button>
            <button className="btn-bubbly" style={{background: 'var(--sky)', boxShadow: '0 4px 0 oklch(80% 0.1 230)'}}>
              🍦 Mis Sabores
            </button>
            <button className="btn-bubbly" style={{background: 'var(--fg)', boxShadow: '0 4px 0 oklch(10% 0 0)'}}>
              🏠 Inicio
            </button>
          </footer>

          {/* Panel de Ajustes (Tweaks) */}
          <div style={{
            position: 'fixed', bottom: 20, right: 20, 
            background: 'white', padding: '10px 15px', 
            borderRadius: '20px', border: '2px solid var(--border)',
            fontSize: '0.75rem', zIndex: 100, opacity: 0.8
          }}>
            <strong>Modo:</strong> Nintendo Soft 🌸
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Game />);
  </script>
</body>
</html>
