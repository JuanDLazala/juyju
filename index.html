<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundo Mágico de Juana y Papá</title>
  <link rel="stylesheet" href="compartido/brand.css" />
  <link rel="stylesheet" href="compartido/ui-kit.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cozy">

  <main class="hub">

    <header class="hub-header pop-in">
      <img src="personajes/manga-selfie-juana-papa.jpeg" alt="Juana y Papá"
           class="hub-selfie"
           onerror="this.style.display='none'" />
      <div class="hub-titulos">
        <h1 class="hub-titulo">
          Mundo <span class="text-accent">Mágico</span>
        </h1>
        <p class="hub-sub-titulo">de Juana <span class="text-accent">y</span> Papá</p>
        <p class="hub-tagline">Una colección de aventuras hechas con amor ✨</p>
      </div>
    </header>

    <section id="grid-juegos" class="hub-grid pop-in"></section>

    <footer class="hub-footer">
      <span>Hecho con 💗 por Papá y Juana</span>
      <span class="hub-separador">·</span>
      <span><strong id="contador-juegos">…</strong> aventuras disponibles</span>
    </footer>

  </main>

  <script>
    const JUEGOS = [
      {
        id: 'juana-no-quiere-dormir',
        nombre: 'Juana no quiere dormir',
        subtitulo: 'Aventura nocturna estilo Pac-Man',
        descripcion: 'Recoge estrellas y cuentos antes de que papá te atrape. ¡Bebe la sopa mágica e invierte la persecución!',
        emoji: '🌙',
        color: 'oklch(80% 0.10 230)',
        ruta: 'juegos/juana-no-quiere-dormir/index.html',
        tags: ['Pac-Man', '2 jugadores', 'Online'],
        estado: 'disponible'
      },
      {
        id: 'el-cuento-de-juana',
        nombre: 'Juana y Munra',
        subtitulo: 'El dragón que aprendió a respirar',
        descripcion: 'Conoce a Munra, la dragoncita que vive en tu corazón. Aprende 5 trucos mágicos para manejar la rabia.',
        emoji: '🐉',
        color: 'oklch(75% 0.15 20)',
        ruta: 'juegos/el-cuento-de-juana/index.html',
        tags: ['Cuento', 'Emociones', '1 jugador'],
        estado: 'disponible'
      },
      {
        id: 'heladeria-de-juana',
        nombre: 'La Heladería de Juana',
        subtitulo: 'Inventa helados locos, haz reír a papá',
        descripcion: 'Mezcla sabores normales y disparatados. Sirve a la familia. ¡Si papá huye, persíguelo estilo Mario Bros!',
        emoji: '🍦',
        color: 'oklch(78% 0.16 80)',
        ruta: 'juegos/heladeria-de-juana/index.html',
        tags: ['Cocina', '2 jugadores', 'Creativo'],
        estado: 'disponible'
      },
      {
        id: 'arte-magico',
        nombre: 'Pinta con Magia',
        subtitulo: 'Lienzo digital con efectos',
        descripcion: 'Pinta con pinceles que dejan estelas de estrellas, fuego, agua y arcoíris.',
        emoji: '🎨',
        color: 'oklch(80% 0.10 160)',
        ruta: null,
        tags: ['Creativo', 'Libre'],
        estado: 'proximamente'
      }
    ];

    const grid = document.getElementById('grid-juegos');
    const disponibles = JUEGOS.filter(j => j.estado === 'disponible').length;
    document.getElementById('contador-juegos').textContent = disponibles;

    JUEGOS.forEach((j, i) => {
      const esJugable = j.estado === 'disponible' && j.ruta;
      const card = document.createElement(esJugable ? 'a' : 'div');
      card.className = 'juego-card ' + (esJugable ? '' : 'juego-proximamente');
      if (esJugable) card.href = j.ruta;
      card.style.setProperty('--firma', j.color);
      card.style.animationDelay = (i * 0.08) + 's';
      card.innerHTML = `
        <div class="juego-emoji floating" style="animation-delay: ${i * 0.5}s">${j.emoji}</div>
        <h2 class="juego-nombre">${j.nombre}</h2>
        <p class="juego-subtitulo">${j.subtitulo}</p>
        <p class="juego-descripcion">${j.descripcion}</p>
        <div class="juego-tags">
          ${j.tags.map(t => `<span class="tag-cozy">${t}</span>`).join('')}
        </div>
        <div class="juego-cta">
          ${esJugable
            ? '<span class="btn-bubbly btn-sun">▶ Jugar</span>'
            : '<span class="cta-proximo">🔒 Próximamente</span>'}
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
